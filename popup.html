<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg-color: #202123;
            --panel-color: #343541;
            --text-main: #ececf1;
            --text-muted: #8e8ea0;
            --accent: #10a37f;
        }
        body { 
            width: 250px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #4d4d4f; padding-bottom: 10px; }
        .header h3 { margin: 0; font-size: 16px; font-weight: 600; }
        .badge { background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold;}
        
        .switch-container { display: flex; justify-content: space-between; align-items: center; background: var(--panel-color); padding: 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #565869; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }
        
        .time-card { background: var(--panel-color); padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .time-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;}
        #time-display { font-size: 16px; font-weight: bold; color: var(--text-main); margin-bottom: 10px;}
        #countdown-display { font-size: 22px; font-weight: bold; color: var(--accent); font-family: monospace; }
        
        .footer { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 5px;}
        #current-time-display { color: var(--text-main); font-family: monospace; font-size: 12px;}
    </style>
</head>
<body>
    <div class="header">
        <h3>Limit Bypass</h3>
        <span class="badge">xD</span>
    </div>
    
    <div class="switch-container">
        <span style="font-size: 14px; font-weight: 500;">Active Status</span>
        <label class="switch">
            <input type="checkbox" id="toggle-switch"> 
            <span class="slider"></span>
        </label>
    </div>

    <div class="time-card">
        <div class="time-label">Target Reset Time</div>
        <div id="time-display">Waiting for limit...</div>
        
        <div class="time-label" style="margin-top: 10px;">Time Remaining</div>
        <div id="countdown-display">--:--:--</div>
    </div>

    <div class="footer">
        Current Local Time: <br>
        <span id="current-time-display">--:--:--</span>
    </div>

    <script src="popup.js"></script>
</body>
</html>
